name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras only — skip heavy ML deps)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # numpy<2 for py-motmetrics 1.4 compatibility
          pip install "numpy<2" scipy pytest pytest-asyncio ruff fastapi "uvicorn[standard]" \
            "pydantic>=2.9" python-multipart httpx motmetrics

      - name: Lint
        working-directory: backend
        run: ruff check services tests || true  # advisory for v1

      - name: Run tests (skip slow — they need MOT17 download)
        working-directory: backend
        run: python -m pytest tests/ -m "not slow" -v

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npx next build
        env:
          BACKEND_URL: http://placeholder:8000
